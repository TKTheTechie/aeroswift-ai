log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: logs/conditional_branching.log

!include ../shared_config.yaml

apps:
  # ============================================================================
  # FLIGHT STATUS CONDITIONAL BRANCHING WORKFLOW
  # ============================================================================
  # Tests switch node with multiple branches and condition evaluation
  # Complexity: Medium
  # Node types: agent (3), switch (1)
  # Features: Conditional branching, switch cases, coalesce output
  #
  # WORKFLOW: Conditional Branching for Passenger Check-in
  # ============================================================================
  - name: check_in_workflow
    app_base_path: .
    app_module: solace_agent_mesh.workflow.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      name: "CheckInWorkflow"
      display_name: "Check In Workflow"

      # Timeout configurations
      max_workflow_execution_time_seconds: 300  # 5 minutes
      default_node_timeout_seconds: 60          # 1 minute

      agent_card:
        description: "Completes frequent flyer and flight status checks for a passenger that has just checked in"
        skills: 
          - id: "conditional_processing"
            name: "Conditional Processing"
            description: "Routes and processes values based on flight status"
            tags: ["eval", "conditional", "switch"]

      agent_card_publishing: { interval_seconds: 10 }
      agent_discovery: { enabled: false }

      workflow:
        version: "1.0.0"
        description: |
          A conditional branching workflow for passenger check-in.

          This workflow:
          1. Looks up information on a passenger who has just checked in, including flight number
          2. Looks up that flight number to determine the flight status
          3. If the flight status is delayed or canceled, offer rebooking suggestions

        input_schema:
          type: object
          properties:
            value:
              type: string
              description: "The frequent flyer number to process"
          required: [value]

        output_schema:
          type: object
          properties:
            result: {type: string}
            handler: {type: string}
            category: {type: string}
          required: [result, handler, category]

        nodes:
          # Step 1: Get flight number and loyalty status
          - id: get_flight
            type: agent
            agent_name: "AeroswiftDB"
            instruction: "Based on the frequent flyer number, determine what their flight number is"
            input:
              value: "{{workflow.input.value}}"

          # Step 2: Get the flight status
          - id: get_status
            type: agent
            agent_name: "FlightInfo"
            depends_on: [get_flight]
            instruction: "Get the flight status of the flight number"
            input:
              value: "{{get_flight.output}}"

          # Step 3: Route based on flight status
          - id: route_by_status
            type: switch
            depends_on: [get_status]
            cases:
              - condition: "'{{get_status.output}}' == 'active'"
                node: handle_happy
              - condition: "'{{get_status.output}}' == 'on-time'"
                node: handle_happy
              - condition: "'{{get_status.output}}' == 'delayed'"
                node: handle_rebook
              - condition: "'{{get_status.output}}' == 'canceled'"
                node: handle_rebook

          # Branch: Handle the happy path
          - id: handle_happy
            type: agent
            agent_name: "AirportMaps"
            depends_on: [route_by_status]
            instruction: "Where are the lounges in this airport?"
            input:
              value: "{{workflow.input.value}}"

          # Branch: Handle rebooking suggetion
          - id: handle_rebook
            type: agent
            agent_name: "FlightInfo"
            depends_on: [route_by_status]
            instruction: "Is there an alternative flight for this delayed/canceled one?"
            input:
              value: "{{workflow.input.value}}"

        output_mapping:
          result:
            coalesce:
              - "{{handle_happy.output.result}}"
              - "{{handle_rebook.output.result}}"
          handler:
            coalesce:
              - "{{handle_happy.output.handler}}"
              - "{{handle_rebook.output.handler}}"
          category: "{{get_flight.output}}"

        skills:
          - id: "conditional_processing"
            name: "Conditional Processing"
            description: "Routes and processes values based on flight status"
            tags: ["eval", "level3", "conditional", "switch"]

      session_service:
        <<: *default_session_service
      artifact_service:
        <<: *default_artifact_service

      agent_card_publishing: { interval_seconds: 10 }
      agent_discovery: { enabled: true }