spring:
  application:
    name: Qdrant (Sink)
  cloud:
    stream:
      qdrant:
        default:
          producer:
            client-type: rest
            # ==================== Qdrant Server Connection ====================
            qdrant-host: localhost          # Change if Qdrant is running elsewhere
            qdrant-port: 6334               # Default gRPC port
            use-tls: false                  # Set to true if you use TLS/HTTPS

            # ==================== Qdrant Collection & Vector ====================
            vector-field-name: embedding    # Field name in JSON payload that contains the vector
            vector-size: 128                # Optional: validates the vector dimension

            # ==================== Point ID Strategy ====================
            id-field-name: pointId          # Field name used as Qdrant Point ID
            auto-generate-id: false         # Set to true if you want Qdrant to auto-generate UUID

            # ==================== Payload Fields (exactly like original Node.js) ====================
            payload-field-names:
              - flyerId                     # Only these fields will be stored in Qdrant payload
            # Add more fields here if needed for other flows, e.g.:
            # - enrolledAt
            # - source
      bindings:
        input-0:
          binder: solace
          destination: enroll-service-queue
        output-0:
          binder: qdrant
          destination: flyers		#Collection name
solace:
  connector:
    security:
      enabled: false
      users:
      - name: user1
        password: pass
      - name: admin1
        password: admin
        roles:
        - admin
    default:
      workflows:
        acknowledgment:
          publish-async: true
    workflows:
      0:
        enabled: true
        acknowledgment:
          publish-async: true
    management:
      leader-election:
        mode: standalone  # The connector’s leader election mode. (values: standalone, active_active, active_standby)
        fail-over:
          max-attempts: 3  # The maximum number of attempts to perform a fail-over.
          back-off-initial-interval: 1000  # The initial interval (milliseconds) to back-off when retrying a fail-over.
          back-off-max-interval: 10000  # The maximum interval (milliseconds) to back-off when retrying a fail-over.
          back-off-multiplier: 2.0  # The multiplier to apply to the back-off interval between each retry of a fail-over.
  java:
    host: tcps://mr-connection-m1g97ppys8a.messaging.solace.cloud:55443
    msgVpn: aeroswift-ai
    clientUsername: solace-cloud-client
    clientPassword: hkvt5hvttma95ndihauhi65odj
    connectRetries: -1
    reconnectRetries: -1
logging:  # Logging configuration. For more info: https://docs.spring.io/spring-boot/docs/current/reference/html/features.html#features.logging
  level:
    root: INFO
    # com.solace.connector.jms: TRACE # Enables TRACE logs for connector
    # com.solace.connector.core: TRACE # Enables TRACE logs for connector framework
    com.solace.spring.cloud.stream.binder: INFO # Enables TRACE logs for Solace and JMS binders
    com.solacecoe.spring.cloud.stream.binders: TRACE # Enables TRACE logs for Solace and JMS binders
  file:
    name: /home/rocky/aeroswift-ai/pubsubplus-connector-qdrant/dist/myapp.log  # base log file name
  logback:
    rollingpolicy:  # Logback file rolling policy
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz"  # Pattern for rolled-over log file names. Example: Rolls the log file into an archive once every day. `%i` is reset to `0` at the start of the day.
      max-file-size: 100MB  # The maximum size of log file before it is archived. Example: Within a given day, when the log file reaches 100 MB, archive it, and increment `%i`.
      max-history: 7  # The maximum rotation-period's worth of archive log files to keep. Example: Since the `file-name-pattern` is configured to rollover once every day, keep 7 days worth of log archives.
      total-size-cap: 1GB  # Total size of log backups for a given rotation period. Example: Keep up-to 1 GB of log archives for every day.
management:
  security:
    enabled: true
  endpoints:
    web:
      exposure:
        include: "health,metrics,loggers,logfile,channels,env,workflows,leaderelection,bindings"
  simple:
    metrics:
      export:
        enabled: true
  endpoint:
    logfile:
      external-file: myapp.log
    prometheus:
      enabled: false
    health:
      show-components: always
      show-details: always
      status:
        # Change default order so that RECONNECTING takes precedence over UP and UNKNOWN
        order:
          - DOWN
          - OUT_OF_SERVICE
          - RECONNECTING
          - UP
          - UNKNOWN
server:
  port: 8099
