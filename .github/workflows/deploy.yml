name: Deploy Web App

on:
  push:
    branches:
      - main
    paths:
      - 'aersoswift-web-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aersoswift-web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aersoswift-web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Copy face-api models
        run: npm run setup-faceapi

      - name: Build
        run: npm run build
        env:
          VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE }}
          VITE_SOLACE_URL: ${{ secrets.VITE_SOLACE_URL }}
          VITE_SOLACE_VPN: ${{ secrets.VITE_SOLACE_VPN }}
          VITE_SOLACE_USERNAME: ${{ secrets.VITE_SOLACE_USERNAME }}
          VITE_SOLACE_PASSWORD: ${{ secrets.VITE_SOLACE_PASSWORD }}
          VITE_VIDEO_TOPIC: ${{ vars.VITE_VIDEO_TOPIC }}
          VITE_ANALYTICS_TOPIC: ${{ vars.VITE_ANALYTICS_TOPIC }}

